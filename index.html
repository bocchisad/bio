<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bocchisad | Developer Portfolio</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='30' fill='%23333333'/><text x='50%' y='55%' dominant-baseline='central' text-anchor='middle' fill='white' font-family='monospace' font-weight='bold' font-size='35'>emo</text></svg>">

    <style>
        :root {
            --bg: #000000;               
            --card-bg: rgba(15, 15, 15, 0.65);
            --accent: #2c2c2c;           
            --text: #f0f0f0;
            --text-dim: #a8a8a8;
        }

        @keyframes fastLoad {
            0% { opacity: 0; filter: blur(15px); transform: scale(1.02); }
            100% { opacity: 1; filter: blur(0); transform: scale(1.0); }
        }

        @keyframes singleGlitch {
            0% { transform: translateY(0) scale(1.02) skewX(0deg); filter: blur(0px); }
            30% { transform: translateY(-6px) scale(1.02) skewX(2deg); filter: blur(1px) brightness(1.2); }
            60% { transform: translateY(-4px) scale(1.02) skewX(-2deg); filter: blur(0px); }
            100% { transform: translateY(-5px) scale(1.02) skewX(0deg); filter: blur(0px); }
        }

        @keyframes btnGlitch {
            0% { transform: translateY(0); }
            50% { transform: translateY(-5px) skewX(1deg); }
            100% { transform: translateY(-4px) skewX(0deg); }
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            animation: fastLoad 0.5s ease-out forwards;
        }

        .background-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, #111111 0%, #000000 100%);
        }

        .container {
            max-width: 600px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 { 
            margin: 0; 
            font-size: 3.5rem; 
            letter-spacing: -3px;
            text-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            font-weight: 800;
            color: var(--text);
        }

        .github-link { 
            color: #9a9a9a; 
            text-decoration: none; 
            font-size: 1rem;
            font-family: monospace;
            opacity: 0.7;
            transition: all 0.3s;
            display: inline-block;
            margin-top: 10px;
        }
        
        .github-link:hover { opacity: 1; text-shadow: 0 0 8px rgba(80, 80, 80, 0.9); letter-spacing: 1px; color: #ffffff; }

        .projects {
            display: grid;
            gap: 15px;
            margin-bottom: 50px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            text-decoration: none;
            color: inherit;
            backdrop-filter: blur(15px);
            display: block;
            will-change: transform;
        }

        .card:hover {
            animation: singleGlitch 0.3s ease-out forwards;
            /* белая обводка вместо серой */
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(70, 70, 70, 0.3);
            background: rgba(25, 25, 25, 0.75);
        }

        .card h3 { 
            margin: 0 0 12px 0; 
            color: #cccccc; 
            font-size: 1.3rem; 
            font-weight: 700;
            font-family: monospace;
        }
        
        .card p { 
            margin: 0; 
            font-size: 1rem; 
            color: var(--text-dim); 
            line-height: 1.6; 
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-btn {
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 14px 28px;
            border-radius: 14px;
            background: rgba(30, 30, 30, 0.7);
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-family: monospace;
        }

        .social-btn:hover { 
            animation: btnGlitch 0.3s ease-out forwards;
            background: var(--accent);
            /* слегка белая подсветка */
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.3);
            border-color: transparent;
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.8rem; letter-spacing: -2px; }
        }
    </style>
</head>
<body>

<div class="background-wrapper"></div>

<div class="container">
    <header>
        <h1>bocchisad</h1>
        <a href="https://github.com/bocchisad" class="github-link" target="_blank">github.com/bocchisad</a>
    </header>

    <div class="projects">
        <a href="https://github.com/bocchisad/universal-converter" class="card" target="_blank">
            <h3>&lt;universal-converter /&gt;</h3>
            <p>Универсальный конвертер документов, изображений, аудио и видео</p>
        </a>

    </div>

    <div class="socials">
        <a href="https://t.me/uselsness" class="social-btn" target="_blank">Telegram</a>
        <a href="https://soundcloud.com/uselsness" class="social-btn" target="_blank">SoundCloud</a>
        <a href="https://steamcommunity.com/id/ecmp1d/" class="social-btn" target="_blank">Steam</a>
    </div>
</div>

</body>
</html>
